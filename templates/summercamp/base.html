<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Soujanya's Summer Camp{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        :root {
            --camp-ink: #1d3557;
            --camp-deep: #12304a;
            --camp-cream: #fff8f0;
            --camp-sun: #ffd166;
            --camp-coral: #ee6c4d;
            --camp-mint: #d8f3dc;
            --camp-blue: #d9edff;
        }

        body {
            background:
                radial-gradient(circle at top left, rgba(255, 209, 102, 0.28), transparent 28%),
                radial-gradient(circle at top right, rgba(238, 108, 77, 0.16), transparent 30%),
                linear-gradient(180deg, #fffaf4 0%, #fffdf9 45%, #f6fbff 100%);
            color: var(--camp-ink);
        }

        .navbar {
            background: rgba(255, 250, 244, 0.92);
            backdrop-filter: blur(10px);
        }

        .hero-card,
        .feature-card,
        .form-card,
        .batch-card {
            border: 0;
            border-radius: 1.25rem;
            box-shadow: 0 1rem 2.5rem rgba(18, 48, 74, 0.08);
        }

        .section-space {
            padding: 5rem 0;
        }

        .accent-pill {
            display: inline-block;
            background: #fff1dc;
            color: #9a5b00;
            border-radius: 999px;
            padding: 0.45rem 0.9rem;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .btn-primary {
            background: var(--camp-coral);
            border-color: var(--camp-coral);
        }

        .btn-primary:hover,
        .btn-primary:focus {
            background: #d85c40;
            border-color: #d85c40;
        }

        .btn-whatsapp {
            background: #25d366;
            border-color: #25d366;
            color: #fff;
        }

        .btn-whatsapp:hover {
            background: #1faa52;
            border-color: #1faa52;
            color: #fff;
        }

        footer {
            background: var(--camp-deep);
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top border-bottom">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'summercamp:home' %}">Soujanya's Summer Camp</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="{% url 'summercamp:home' %}#sessions">Sessions</a>
                    <a class="nav-link" href="{% url 'summercamp:home' %}#activities">Activities</a>
                    <a class="nav-link" href="{% url 'summercamp:home' %}#enquiry">Enquiry</a>
                </div>
            </div>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
